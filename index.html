<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logistics Command Board — MinebeaMitsumi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1120;
  --panel:#141D33;
  --panel-2:#1A2540;
  --line:rgba(255,255,255,0.07);
  --line-soft:rgba(255,255,255,0.04);
  --ink:#EDF0FA;
  --ink-dim:#9FACC9;
  --ink-faint:#5E6A8C;

  --blue:#4C8DFF;
  --blue-deep:#1B3E8C;
  --teal:#2FBF9F;
  --amber:#F2B84B;
  --coral:#F06B7A;
  --purple:#9C8CFB;

  --good:#3FCB8F;
  --warn:#F2B84B;
  --bad:#F0576B;

  --radius-lg:24px;
  --radius-md:18px;
  --font-display:'Oswald',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:
    radial-gradient(1100px 550px at 10% -15%, rgba(76,141,255,0.10), transparent 60%),
    radial-gradient(900px 500px at 105% 8%, rgba(156,140,251,0.07), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

#pulseRail{position:fixed; top:0; left:0; height:3px; width:100%; background:var(--panel-2); z-index:60;}
#pulseFill{height:100%; width:0%; background:linear-gradient(90deg, var(--blue), var(--purple)); transition:width .25s linear;}

.stage{height:100vh; width:100vw; display:flex; flex-direction:column; padding:32px 44px 24px;}

header{display:flex; align-items:center; justify-content:space-between; padding-bottom:20px; margin-bottom:20px; border-bottom:1px solid var(--line);}
.brand{display:flex; align-items:center; gap:16px;}
.brand-mark{
  width:46px; height:46px; border-radius:13px;
  background:linear-gradient(135deg, var(--blue-deep), #0C1A3E);
  border:1px solid rgba(76,141,255,0.35);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:600; font-size:19px; color:var(--ink);
  position:relative;
}
.brand-mark::after{content:''; position:absolute; right:-5px; top:-5px; width:16px; height:16px; background:var(--coral); border-radius:50%; opacity:.85;}
.brand-text .dept{font-family:var(--font-display); font-weight:500; font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);}
.brand-text .title{font-family:var(--font-display); font-weight:500; font-size:25px; letter-spacing:.01em;}
.brand-text .title b{color:var(--blue); font-weight:600;}

.header-right{display:flex; align-items:center; gap:18px;}
.lang-toggle{display:flex; background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px;}
.lang-btn{border:none; background:transparent; color:var(--ink-faint); font-family:var(--font-mono); font-size:12px; font-weight:500; padding:7px 13px; border-radius:999px; cursor:pointer; letter-spacing:.05em; transition:background .2s, color .2s;}
.lang-btn.active{background:var(--blue); color:#081026; font-weight:700;}
.status-pill{display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12.5px; color:var(--ink-dim); background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:7px 14px;}
.dot{width:7px; height:7px; border-radius:50%; background:var(--ink-faint);}
.dot.live{background:var(--good); box-shadow:0 0 7px var(--good);}
.dot.stale{background:var(--warn); box-shadow:0 0 7px var(--warn);}
.dot.error{background:var(--bad); box-shadow:0 0 7px var(--bad);}
.clock{font-family:var(--font-mono); font-weight:500; font-size:26px; letter-spacing:.02em; text-align:right;}
.clock .date{display:block; font-size:11.5px; color:var(--ink-faint); font-weight:400; letter-spacing:.06em; margin-top:2px;}

main{flex:1; min-height:0; position:relative;}
.page{position:absolute; inset:0; opacity:0; transform:translateY(12px); pointer-events:none; transition:opacity .55s ease, transform .55s ease; display:flex; flex-direction:column; min-height:0;}
.page.active{opacity:1; transform:translateY(0); pointer-events:auto;}
.page-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px;}
.page-eyebrow{font-family:var(--font-mono); font-size:12.5px; color:var(--blue); letter-spacing:.16em; text-transform:uppercase;}
.page-title{font-family:var(--font-display); font-size:32px; font-weight:500; margin-top:5px;}

.kpi-row{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:18px;}
.kpi{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-md); padding:18px 20px; display:flex; flex-direction:column; gap:10px;}
.kpi .top{display:flex; align-items:center; gap:8px;}
.kpi .swatch{width:9px; height:9px; border-radius:50%;}
.kpi .label{font-size:12.5px; color:var(--ink-dim); letter-spacing:.02em;}
.kpi .value{font-family:var(--font-display); font-size:38px; font-weight:500; line-height:1;}
.kpi .sub{font-size:11.5px; color:var(--ink-faint); font-family:var(--font-mono);}

.chart-row{display:grid; grid-template-columns:340px 1fr; gap:18px; margin-bottom:18px; flex-shrink:0;}
.chart-panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px;}
.chart-panel h3{font-family:var(--font-display); font-weight:500; font-size:15px; color:var(--ink-dim); margin-bottom:14px; letter-spacing:.03em;}

.donut-panel{display:flex; flex-direction:column; align-items:center;}
.donut-wrap{position:relative; width:172px; height:172px; margin-bottom:18px;}
.donut-ring{width:100%; height:100%; border-radius:50%;}
.donut-hole{position:absolute; inset:24px; border-radius:50%; background:var(--panel); display:flex; flex-direction:column; align-items:center; justify-content:center;}
.donut-hole .num{font-family:var(--font-display); font-size:30px; font-weight:600; line-height:1;}
.donut-hole .lbl{font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.08em; margin-top:4px;}
.legend{width:100%; display:flex; flex-direction:column; gap:10px;}
.legend-row{display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--ink-dim);}
.legend-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
.legend-row .name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.legend-row .val{font-family:var(--font-mono); color:var(--ink); font-size:13px;}

.bars-panel{display:flex; flex-direction:column; justify-content:center; gap:13px;}
.bar-row{display:flex; align-items:center; gap:12px;}
.bar-label{width:132px; font-size:13.5px; color:var(--ink-dim); flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.bar-track{flex:1; height:12px; background:var(--panel-2); border-radius:8px; overflow:hidden;}
.bar-fill{height:100%; border-radius:8px;}
.bar-val{width:58px; text-align:right; font-family:var(--font-mono); font-size:13px; color:var(--ink);}

.table-wrap{flex:1; min-height:0; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column;}
.table-scroll{flex:1; overflow:hidden; position:relative;}
table{width:100%; border-collapse:collapse;}
thead th{text-align:left; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); padding:13px 22px; background:var(--panel-2); border-bottom:1px solid var(--line);}
tbody td{padding:13px 22px; font-size:15px; border-bottom:1px solid var(--line-soft); color:var(--ink);}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:11.5px; padding:5px 11px; border-radius:999px; font-weight:500; letter-spacing:.02em;}
.badge.good{background:rgba(63,203,143,0.13); color:var(--good);}
.badge.warn{background:rgba(242,184,75,0.13); color:var(--warn);}
.badge.bad{background:rgba(240,87,122,0.13); color:var(--bad);}
.badge.neutral{background:rgba(159,172,201,0.13); color:var(--ink-dim);}
.empty-state{flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--ink-faint); gap:8px; padding:40px;}
.empty-state .big{font-family:var(--font-display); font-size:20px; color:var(--ink-dim);}

footer{display:flex; align-items:center; justify-content:center; gap:10px; padding-top:16px;}
.dots{display:flex; gap:8px;}
.pdot{width:32px; height:4px; border-radius:3px; background:var(--line); transition:background .3s;}
.pdot.active{background:var(--blue);}
.page-label{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); letter-spacing:.1em; margin-left:14px; text-transform:uppercase;}

.demo-flag{position:fixed; bottom:14px; right:20px; z-index:70; font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); background:rgba(0,0,0,0.25); border:1px solid var(--line); padding:5px 10px; border-radius:8px; display:none;}
.demo-flag.show{display:block;}

/* ---------- Progress panel (page 4) ---------- */
.progress-panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px 24px; margin-bottom:16px;}
.progress-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.progress-head h3{font-family:var(--font-display); font-weight:500; font-size:16px; color:var(--ink-dim);}
.progress-tags{display:flex; gap:8px;}
.ptrack{height:16px; background:var(--panel-2); border-radius:10px; overflow:hidden; margin-bottom:10px;}
.pfill{height:100%; border-radius:10px; background:linear-gradient(90deg, var(--teal), var(--good)); display:flex; align-items:center; justify-content:flex-end; padding-right:10px; font-family:var(--font-mono); font-size:11px; color:#08170F; font-weight:700; transition:width .5s ease;}
.progress-sub{font-size:12.5px; color:var(--ink-faint); font-family:var(--font-mono);}

.time-row{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px;}
.time-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-md); padding:18px 20px; text-align:center;}
.time-card .tlabel{font-size:12.5px; color:var(--ink-dim); margin-bottom:10px;}
.time-card .tvalue{font-family:var(--font-display); font-size:30px; font-weight:500;}

.completion-panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px 24px; margin-bottom:16px;}
</style>
</head>
<body>

<div id="pulseRail"><div id="pulseFill"></div></div>

<div class="stage">
  <header>
    <div class="brand">
      <div class="brand-mark">MM</div>
      <div class="brand-text">
        <div class="dept" id="deptLine">Logistics &amp; Fleet Tracking</div>
        <div class="title">Command <b>Board</b></div>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-toggle" id="langToggle">
        <button class="lang-btn active" data-lang="th">TH</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <div class="status-pill"><span id="connDot" class="dot"></span><span id="connText">Connecting…</span></div>
      <div class="status-pill" id="fallbackPill" style="display:none; color:var(--warn); border-color:rgba(242,184,75,0.3);"><span id="fallbackText"></span></div>
      <div class="clock"><span id="clockTime">--:--:--</span><span class="date" id="clockDate">-</span></div>
    </div>
  </header>

  <main id="pages"></main>

  <footer>
    <div class="dots" id="dots"></div>
    <div class="page-label" id="pageLabel"></div>
  </footer>
</div>

<div class="demo-flag" id="demoFlag">DEMO DATA</div>

function t(path){
  const parts = path.split('.');
  let node = STRINGS[LANG];
  for(const p of parts){ node = node ? node[p] : undefined; }
  return node ?? path;
}

/* =====================================================================
   Helpers
   ===================================================================== */
function findField(row, hints){
  if(!row) return null;
  const keys = Object.keys(row);
  for(const k of keys){
    const lk = k.toLowerCase();
    if(hints.some(h => lk.includes(h.toLowerCase()))) return k;
  }
  return null;
}
function getVal(row, hints){ const f = findField(row, hints); return f ? (row[f] ?? '') : ''; }
function statusClass(s){
  s = (s||'').toString().toLowerCase();
  if(/delay|late|ปัญหา|ล่าช้า/.test(s)) return 'bad';
  if(/pending|wait|รอ/.test(s)) return 'warn';
  if(/deliver|release|complete|เสร็จ|checked/.test(s)) return 'good';
  return 'neutral';
}
function isToday(dateStr){
  if(!dateStr) return true;
  const d = new Date(dateStr);
  if(isNaN(d)) return true;
  const now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}
function groupCount(rows, hints){
  const out = {};
  rows.forEach(r=>{
    const key = (getVal(r, hints) || t('notSpecified')).toString().trim() || t('notSpecified');
    out[key] = (out[key]||0) + 1;
  });
  return out;
}
function groupSum(rows, groupHints, valueHints){
  const out = {};
  rows.forEach(r=>{
    const key = (getVal(r, groupHints) || t('notSpecified')).toString().trim() || t('notSpecified');
    const val = parseFloat((getVal(r, valueHints)||'0').toString().replace(/,/g,'')) || 0;
    out[key] = (out[key]||0) + val;
  });
  return out;
}
function toEntries(obj, limit){ return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0, limit||8); }

function renderDonut(hostId, entries, centerLabel){
  const host = document.getElementById(hostId);
  const total = entries.reduce((s,[,v])=>s+v,0) || 1;
  let cum = 0;
  const stops = entries.map(([label,val],i)=>{
    const pct = val/total*100;
    const s = `${PALETTE[i%PALETTE.length]} ${cum}% ${cum+pct}%`;
    cum += pct;
    return s;
  });
  const gradient = entries.length ? `conic-gradient(${stops.join(',')})` : 'conic-gradient(var(--panel-2) 0% 100%)';
  host.innerHTML = `
    <div class="donut-wrap">
      <div class="donut-ring" style="background:${gradient}"></div>
      <div class="donut-hole"><div class="num">${total.toLocaleString()}</div><div class="lbl">${centerLabel}</div></div>
    </div>
    <div class="legend">
      ${entries.map(([label,val],i)=>`
        <div class="legend-row">
          <span class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></span>
          <span class="name">${label}</span>
          <span class="val">${val.toLocaleString()}</span>
        </div>`).join('') || `<div class="legend-row"><span class="name">${t('notSpecified')}</span></div>`}
    </div>`;
}
function renderBars(hostId, entries, unit){
  const host = document.getElementById(hostId);
  const max = Math.max(...entries.map(e=>e[1]), 1);
  host.innerHTML = entries.map(([label,val],i)=>`
    <div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/max*100).toFixed(0)}%; background:${PALETTE[i%PALETTE.length]}"></div></div>
      <div class="bar-val">${val.toLocaleString()}${unit||''}</div>
    </div>`).join('') || `<div class="legend-row"><span class="name">${t('notSpecified')}</span></div>`;
}

   ===================================================================== */
let STATE = { raw: null, demo: true, connKind:'stale', connKey:'connecting' };

async function fetchData(){
  if(!CONFIG.API_URL){
    STATE.raw = DEMO; STATE.demo = true;
    setConn('stale', 'staleDemo');
    render();
    return;
  }
  try{
    setConn('stale','staleUpdating');
    const res = await fetch(CONFIG.API_URL, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    STATE.raw = json; STATE.demo = false;
    STATE.isFallbackDate = !!json.isFallbackDate;
    STATE.displayDate = json.displayDate || '';
    setConn('live','liveText');
    updateFallbackPill();
  }catch(err){
    console.warn('Fetch failed, using last known / demo data:', err);
    if(!STATE.raw){ STATE.raw = DEMO; STATE.demo = true; }
    setConn('error','errorText');
  }
  render();
}
function setConn(kind, key){
  STATE.connKind = kind; STATE.connKey = key;
  document.getElementById('connDot').className = 'dot ' + kind;
  document.getElementById('connText').textContent = t(key);
  document.getElementById('demoFlag').textContent = t('demoFlag');
  document.getElementById('demoFlag').classList.toggle('show', STATE.demo);
}
function updateFallbackPill(){
  const pill = document.getElementById('fallbackPill');
  if(STATE.isFallbackDate && STATE.displayDate){
    document.getElementById('fallbackText').textContent = t('fallbackNote') + STATE.displayDate;
    pill.style.display = 'flex';
  } else {
    pill.style.display = 'none';
  }
}

function parseTimeVal(v){
  if(!v) return null;
  const s = v.toString().trim();
  const d = new Date(s.includes(' ') || s.includes('T') ? s : ('2000-01-01 '+s));
  return isNaN(d) ? null : d;
}
function hoursBetween(a,b){
  if(!a || !b) return null;
  const diff = (b - a) / 36e5;
  return diff >= 0 ? diff : null;
}
function fmtHrs(h){
  if(h===null || isNaN(h)) return '0:00';
  const whole = Math.floor(h);
  const mins = Math.round((h - whole) * 60);
  return `${whole}:${mins.toString().padStart(2,'0')}`;
}

function renderProgress(rows, orderRows, progressPayload){
  const el = document.getElementById('page-progress');
  const p = STRINGS[LANG].progress;

  if(progressPayload){
    renderProgressFromPayload(el, p, progressPayload);
    return;
  }

  if(!rows.length){ el.querySelector('.dynamic').innerHTML = emptyState(t('empty.shipments')); return; }

  const today = rows.filter(r => isToday(getVal(r, CONFIG.FIELD_HINTS.arrival) || getVal(r, CONFIG.FIELD_HINTS.date)));
  const list = today.length ? today : rows;

  // Progress vs Daily Order
  const totalOrders = orderRows.length || list.length;
  const matched = list.filter(r=>{
    const s = (getVal(r, CONFIG.FIELD_HINTS.matchedOrder)||'').toString().toLowerCase();
    return /yes|matched|ตรง|true/.test(s) || !!getVal(r, CONFIG.FIELD_HINTS.orderNo);
  }).length;
  const pendingCount = list.filter(r=>/pending|รอ/i.test(getVal(r, CONFIG.FIELD_HINTS.status)||'')).length;
  const unmatchedCount = Math.max(list.length - matched, 0);
  const progressPct = totalOrders ? Math.min(100, Math.round(matched/totalOrders*100)) : 0;

  // Container status counts
  const completed = list.filter(r=>/deliver|complete|เสร็จ|release/i.test(getVal(r, CONFIG.FIELD_HINTS.status)||'')).length;
  const inProgress = list.filter(r=>/progress|transit|loading|ขนส่ง/i.test(getVal(r, CONFIG.FIELD_HINTS.status)||'')).length;
  const pendingStatus = list.filter(r=>/pending|รอ/i.test(getVal(r, CONFIG.FIELD_HINTS.status)||'')).length;

  // Avg times
  const waitHrs=[], loadHrs=[], releaseHrs=[], totalHrs=[];
  list.forEach(r=>{
    const start = parseTimeVal(getVal(r, CONFIG.FIELD_HINTS.startLoading));
    const finish = parseTimeVal(getVal(r, CONFIG.FIELD_HINTS.finishLoading));
    const release = parseTimeVal(getVal(r, CONFIG.FIELD_HINTS.releaseTime));
    const arrival = parseTimeVal(getVal(r, CONFIG.FIELD_HINTS.arrival));
    const w = hoursBetween(arrival, start); if(w!==null) waitHrs.push(w);
    const l = hoursBetween(start, finish); if(l!==null) loadHrs.push(l);
    const rl = hoursBetween(finish, release); if(rl!==null) releaseHrs.push(rl);
    const tt = hoursBetween(arrival, release); if(tt!==null) totalHrs.push(tt);
  });
  const avg = arr => arr.length ? arr.reduce((s,x)=>s+x,0)/arr.length : 0;

  const statusEntries = [[p.completed,completed],[p.inProgress,inProgress],[p.pendingCard,pendingStatus]].filter(e=>e[1]>0);
  const portEntries = toEntries(groupCount(list, CONFIG.FIELD_HINTS.port), 6);
  const completionPct = list.length ? Math.round(completed/list.length*100) : 0;

  renderProgressFromPayload(el, p, {
    total: list.length, completed, inProgress, pending: pendingStatus, completedPct: completionPct,
    orderProgress: { totalOrders, matched, pending: pendingCount, unmatched: unmatchedCount, pct: progressPct },
    avgTimes: { waitTime: avg(waitHrs), loadingTime: avg(loadHrs), releaseProcess: avg(releaseHrs), totalTime: avg(totalHrs) },
    byPort: Object.fromEntries(portEntries),
    _statusEntries: statusEntries
  });
}

    </div>
    <div class="time-row">
      <div class="time-card"><div class="tlabel">${p.avgWait}</div><div class="tvalue">${fmtHrs(at.waitTime)} ${p.hrsUnit}</div></div>
      <div class="time-card"><div class="tlabel">${p.avgLoading}</div><div class="tvalue">${fmtHrs(at.loadingTime)} ${p.hrsUnit}</div></div>
      <div class="time-card"><div class="tlabel">${p.avgRelease}</div><div class="tvalue">${fmtHrs(at.releaseProcess)} ${p.hrsUnit}</div></div>
      <div class="time-card"><div class="tlabel">${p.avgTotal}</div><div class="tvalue">${fmtHrs(at.totalTime)} ${p.hrsUnit}</div></div>
    </div>
    <div class="chart-row" style="margin-bottom:0; flex:1;">
      <div class="chart-panel donut-panel"><h3 style="align-self:flex-start">${t('chart.statusDist')}</h3><div id="donut-progress"></div></div>
      <div class="chart-panel bars-panel"><h3>${t('chart.byPort')}</h3><div id="bars-progress"></div></div>
    </div>`;
  renderDonut('donut-progress', statusEntries, t('centerLabel.shipments'));
  renderBars('bars-progress', portEntries);
}

function emptyState(msg){
  return `<div class="empty-state"><div class="big">${msg}</div><div>${t('empty.hint')}</div></div>`;
}

/* =====================================================================
   Page shell + rotation
   ===================================================================== */
const PAGE_IDS = ['shipments','trucks','orders','progress'];

function buildPages(){
  const main = document.getElementById('pages');
  main.innerHTML = PAGE_IDS.map((id,i)=>`
    <section class="page ${i===currentPage?'active':''}" id="page-${id}">
      <div class="page-head">
        <div><div class="page-eyebrow">${t('pages.'+id+'.eyebrow')}</div><div class="page-title">${t('pages.'+id+'.title')}</div></div>
      </div>
      <div class="dynamic" style="flex:1; min-height:0; display:flex; flex-direction:column;"></div>
    </section>`).join('');

  const dots = document.getElementById('dots');
  dots.innerHTML = PAGE_IDS.map((_,i)=>`<div class="pdot ${i===currentPage?'active':''}" data-i="${i}"></div>`).join('');
  document.getElementById('pageLabel').textContent = t('pages.'+PAGE_IDS[currentPage]+'.title');
}

let currentPage = 0;
function goToPage(i){
  document.querySelectorAll('.page').forEach((el,idx)=>el.classList.toggle('active', idx===i));
  document.querySelectorAll('.pdot').forEach((el,idx)=>el.classList.toggle('active', idx===i));
  document.getElementById('pageLabel').textContent = t('pages.'+PAGE_IDS[i]+'.title');
  currentPage = i;
}

let rotateStart = Date.now();
function rotateLoop(){
  const elapsed = Date.now() - rotateStart;
  const pct = Math.min(100, (elapsed / CONFIG.ROTATE_MS) * 100);
  document.getElementById('pulseFill').style.width = pct + '%';
  if(elapsed >= CONFIG.ROTATE_MS){
    goToPage((currentPage + 1) % PAGE_IDS.length);
    rotateStart = Date.now();
  }
  requestAnimationFrame(rotateLoop);
}

function tickClock(){
  const now = new Date();
  const locale = LANG==='th' ? 'th-TH' : 'en-US';
  document.getElementById('clockTime').textContent = now.toLocaleTimeString(locale, {hour12:false});
  document.getElementById('clockDate').textContent = now.toLocaleDateString(locale, {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

/* ---------- Language toggle ---------- */
function applyLanguage(){
  document.getElementById('deptLine').textContent = t('dept');
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===LANG));
  setConn(STATE.connKind, STATE.connKey);
  updateFallbackPill();
  buildPages();
  goToPage(currentPage);
  tickClock();
  if(STATE.raw) render();
}
document.getElementById('langToggle').addEventListener('click', e=>{
  const btn = e.target.closest('.lang-btn'); if(!btn) return;
  if(btn.dataset.lang===LANG) return;
  LANG = btn.dataset.lang;
  applyLanguage();
});

/* ---------- Init ---------- */
buildPages();
tickClock(); setInterval(tickClock, 1000);
fetchData();
setInterval(fetchData, CONFIG.REFRESH_MS);
requestAnimationFrame(rotateLoop);

document.getElementById('dots').addEventListener('click', e=>{
  const t = e.target.closest('.pdot'); if(!t) return;
  goToPage(parseInt(t.dataset.i)); rotateStart = Date.now();
});
</script>
</body>
</html>
